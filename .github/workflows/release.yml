name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -n 2 | tail -n 1 || echo "")
          echo "previous_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "current_tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create release archive
        run: |
          tar czf speckit-sdd-${{ github.ref_name }}.tar.gz \
            AGENTS.md install.sh install.ps1 opencode.jsonc package.json \
            README.md LICENSE .github/ \
            agents/ commands/ templates/ skills/ tools/ docs/

      - name: Generate checksum
        run: |
          shasum -a 256 speckit-sdd-${{ github.ref_name }}.tar.gz > speckit-sdd-${{ github.ref_name }}.tar.gz.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: speckit-sdd ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            speckit-sdd-${{ github.ref_name }}.tar.gz
            speckit-sdd-${{ github.ref_name }}.tar.gz.sha256
            install.sh
            install.ps1
